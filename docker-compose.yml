services:
  iic:
    container_name: iic-website
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - app_env
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      ADMIN_EMAIL: ${ADMIN_EMAIL:-web@iic.edu.np}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-IIC@2026}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

secrets:
  app_env:
    file: .env.production
